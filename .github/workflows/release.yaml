name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 1. Create a DRAFT release first (Drafts are never immutable)
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Init Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The --draft flag prevents the release from becoming "Immutable"
          gh release create ${{ github.ref_name }} --draft --title "Release ${{ github.ref_name }}" --notes "Automated build." || echo "Already exists"

  # 2. Build and Upload to the Draft
  build:
    name: Build on ${{ matrix.os }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64
          - os: macos-latest
            asset_name: mar-macos-arm64
          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Upload
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv bin/mar.exe ${{ matrix.asset_name }}
          else
            mv bin/mar ${{ matrix.asset_name }}
          fi
          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} --clobber

  # 3. Publish the release only after ALL uploads are done
  publish_release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make Public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false