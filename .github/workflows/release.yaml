name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Create draft release ──────────────────────────────────────────────
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Mar ${{ github.ref_name }}" \
            --notes "See [install instructions](https://github.com/${{ github.repository }}#installation)." \
          || echo "Release already exists, continuing."

  # ── 2. Build all platforms ───────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.asset_name }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64

          - os: macos-latest        # ARM64 (Apple Silicon)
            asset_name: mar-macos-arm64
            flags: ""

          - os: macos-latest        # Cross-compile for Intel x86_64
            asset_name: mar-macos-x86_64
            flags: "-target x86_64-apple-macos11"

          - os: windows-latest      # Windows x64
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GCC (Windows)
        if: matrix.os == 'windows-latest'
        uses: egor-tensin/setup-gcc@v1
        with:
          platform: x64

      - name: Build
        shell: bash
        run: |
          # Ensure directories exist before make runs
          mkdir -p bin build
          
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Use cross-compilation flags if provided
            make CFLAGS="-Wall -Wextra -std=c11 -Iinclude ${{ matrix.flags }}"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Force gcc and manual move to handle .exe extension
            make CC=gcc
          else
            make
          fi

      - name: Prepare Binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows 'make' may produce mar or mar.exe depending on environment
            if [ -f "bin/mar.exe" ]; then mv bin/mar.exe "${{ matrix.asset_name }}";
            else mv bin/mar "${{ matrix.asset_name }}"; fi
          else
            mv bin/mar "${{ matrix.asset_name }}"
          fi

      - name: Upload binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} "${{ matrix.asset_name }}" --clobber

  # ── 3. Upload install scripts ────────────────────────────────────────────
  upload_installers:
    name: Upload Install Scripts
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} install.sh --clobber
          gh release upload ${{ github.ref_name }} install.ps1 --clobber

  # ── 4. Publish after everything succeeds ────────────────────────────────
  publish_release:
    name: Publish Release
    needs: [build, upload_installers]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false