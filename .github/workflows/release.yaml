name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  # ── 1. Create a draft release first ────────────────────────────────────────
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated build." \
          || echo "Release already exists, continuing."

  # ── 2. Build each platform and upload to the draft ─────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64
          - os: macos-latest
            asset_name: mar-macos-arm64
          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW (Windows only)
        if: matrix.os == 'windows-latest'
        run: choco install mingw -y

      - name: Build
        run: make

      - name: Upload binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ -f "bin/mar.exe" ]; then
              mv bin/mar.exe ${{ matrix.asset_name }}
            elif [ -f "bin/mar" ]; then
              mv bin/mar ${{ matrix.asset_name }}
            else
              echo "Error: binary not found in bin/" && exit 1
            fi
          else
            mv bin/mar ${{ matrix.asset_name }}
          fi

          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} --clobber

  # ── 3. Publish only after all uploads succeed ───────────────────────────────
  publish_release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false