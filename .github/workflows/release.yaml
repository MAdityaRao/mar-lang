name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Create draft release ──────────────────────────────────────────────
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Mar ${{ github.ref_name }}" \
            --notes "See [install instructions](https://github.com/${{ github.repository }}#installation)."

  # ── 2. Build all platforms ───────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.asset_name }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64

          - os: macos-latest        # ARM64 (Apple Silicon)
            asset_name: mar-macos-arm64
            flags: ""

          - os: macos-latest        # Cross-compile for Intel x86_64
            asset_name: mar-macos-x86_64
            flags: "-target x86_64-apple-macos11"

          - os: windows-latest      # Windows x64
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          # Create directories manually to ensure no permission issues [cite: 3, 4]
          mkdir -p bin build
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # ZERO-ACTION WINDOWS SETUP:
            # Manually inject the pre-installed MinGW path into the runner's PATH
            export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:$PATH"
            [cite_start]make CC=gcc [cite: 1]
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            [cite_start]make CFLAGS="-Wall -Wextra -std=c11 -Iinclude ${{ matrix.flags }}" [cite: 1]
          else
            [cite_start]make [cite: 1]
          fi

      - name: Prepare and Upload Binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows 'make' may produce mar or mar.exe; check for both [cite: 1]
            if [ -f "bin/mar.exe" ]; then
              mv bin/mar.exe "${{ matrix.asset_name }}"
            else
              mv bin/mar "${{ matrix.asset_name }}"
            fi
          else
            mv bin/mar "${{ matrix.asset_name }}" [cite: 1]
          fi
          
          # Upload directly to the draft release created in Step 1
          gh release upload ${{ github.ref_name }} "${{ matrix.asset_name }}" --clobber

  # ── 3. Upload install scripts ────────────────────────────────────────────
  upload_installers:
    name: Upload Install Scripts
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} install.sh --clobber
          gh release upload ${{ github.ref_name }} install.ps1 --clobber

  # ── 4. Publish after everything succeeds ────────────────────────────────
  publish_release:
    name: Publish Release
    needs: [build, upload_installers]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false