name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64
          - os: macos-latest
            asset_name: mar-macos-arm64
          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Created by GitHub, so this is allowed

      - name: Build Mar Compiler
        run: make #

      - name: Rename and Upload
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the 'gh' tool which is native to GitHub
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv bin/mar.exe ${{ matrix.asset_name }}
          else
            mv bin/mar ${{ matrix.asset_name }}
          fi
          
          # This command creates/updates the release and uploads the file
          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} --clobber || \
          gh release create ${{ github.ref_name }} ${{ matrix.asset_name }} --title "Release ${{ github.ref_name }}" --notes "Automated release"