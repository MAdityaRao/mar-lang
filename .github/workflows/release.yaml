name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Create draft release ──────────────────────────────────────────────
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Mar ${{ github.ref_name }}" \
            --notes "See [install instructions](https://github.com/${{ github.repository }}#installation)." \
          || echo "Release already exists, continuing."

  # ── 2. Build all platforms ───────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.asset_name }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64

          - os: macos-latest        # arm64 (M1–M5)
            asset_name: mar-macos-arm64

          - os: macos-13            # x86_64 (Intel)
            asset_name: mar-macos-x86_64

          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            make CC=gcc
          else
            make
          fi

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if   [ -f "bin/mar.exe" ]; then mv bin/mar.exe "${{ matrix.asset_name }}"
            elif [ -f "bin/mar"     ]; then mv bin/mar     "${{ matrix.asset_name }}"
            else echo "Binary not found in bin/" && exit 1
            fi
          else
            mv bin/mar "${{ matrix.asset_name }}"
          fi

      - name: Upload binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} "${{ matrix.asset_name }}" --clobber

  # ── 3. Upload install scripts ────────────────────────────────────────────
  upload_installers:
    name: Upload Install Scripts
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} install.sh --clobber
          gh release upload ${{ github.ref_name }} install.ps1 --clobber

  # ── 4. Publish after everything succeeds ────────────────────────────────
  publish_release:
    name: Publish Release
    needs: [build, upload_installers]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false