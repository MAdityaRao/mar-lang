name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Create draft release ──────────────────────────────────────────────
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Mar ${{ github.ref_name }}" \
            --notes "See [install instructions](https://github.com/${{ github.repository }}#installation)."

  # ── 2. Build all platforms ───────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.asset_name }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64
          - os: macos-latest
            asset_name: mar-macos-arm64
            flags: ""
          - os: macos-latest
            asset_name: mar-macos-x86_64
            flags: "-target x86_64-apple-macos11"
          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          mkdir -p bin build
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Manually inject the pre-installed MinGW path for Windows
            export PATH="/c/msys64/mingw64/bin:/c/msys64/usr/bin:$PATH"
            make CC=gcc
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            make CFLAGS="-Wall -Wextra -std=c11 -Iinclude ${{ matrix.flags }}"
          else
            make
          fi

      - name: Upload Binary
        shell: bash
        env:
          # This variable allows the 'gh' command to authenticate
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Check for the binary with or without .exe
            [ -f "bin/mar.exe" ] && FILE="bin/mar.exe" || FILE="bin/mar"
            mv "$FILE" "${{ matrix.asset_name }}"
          else
            mv bin/mar "${{ matrix.asset_name }}"
          fi
          gh release upload ${{ github.ref_name }} "${{ matrix.asset_name }}" --clobber

  # ── 3. Upload install scripts ────────────────────────────────────────────
  upload_installers:
    name: Upload Scripts
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} install.sh --clobber
          gh release upload ${{ github.ref_name }} install.ps1 --clobber

  # ── 4. Publish after everything succeeds ────────────────────────────────
  publish_release:
    name: Publish Release
    needs: [build, upload_installers]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false