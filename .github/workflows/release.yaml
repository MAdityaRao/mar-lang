name: Build and Release

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write # Required for 'gh' to modify releases

jobs:
  # STEP 1: Create the Release entry once
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This creates the tag and release structure first
          gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes "Automated build." || echo "Already exists"

  # STEP 2: Build and Upload (Wait for Step 1)
  build:
    name: Build on ${{ matrix.os }}
    needs: create_release # This is the magic line that prevents the 422 error
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64
          - os: macos-latest
            asset_name: mar-macos-arm64
          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Mar Compiler
        run: make #

      - name: Rename and Upload
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prepare the file based on the OS
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv bin/mar.exe ${{ matrix.asset_name }}
          else
            mv bin/mar ${{ matrix.asset_name }}
          fi
          
          # Upload to the pre-existing release
          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} --clobber