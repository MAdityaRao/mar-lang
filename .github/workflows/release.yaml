name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.7

permissions:
  contents: write # Essential for the 'gh' tool to create releases

jobs:
  # Stage 1: Create the Release entry once to avoid race conditions
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release only once. If it exists, this step just finishes.
          gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes "Automated build for Mar Language." || echo "Release already exists"

  # Stage 2: Build and Upload for each OS
  build:
    name: Build on ${{ matrix.os }}
    needs: create_release # Wait until the release entry is created
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mar-linux-x86_64
          - os: macos-latest
            asset_name: mar-macos-arm64
          - os: windows-latest
            asset_name: mar-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Mar Compiler
        run: make # Uses your Makefile to generate bin/mar

      - name: Rename and Upload
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Move binary to the expected asset name
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv bin/mar.exe ${{ matrix.asset_name }}
          else
            mv bin/mar ${{ matrix.asset_name }}
          fi
          
          # Upload specifically to the existing tag
          gh release upload ${{ github.ref_name }} ${{ matrix.asset_name }} --clobber